<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=5.0, user-scalable=yes">
    <meta name="description" content="Employee Login - Lawrenceburg Pressure Washing">
    <meta name="theme-color" content="#f87102">
    <link rel="icon" type="image/webp" href="images/logosquare.webp">
    <title>Employee Login | Lawrenceburg Pressure Washing</title>
    <link rel="stylesheet" href="css/styles.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet">
    <style>
        .login-hero {
            min-height: 100vh;
            background: linear-gradient(135deg, var(--fire-dragon) 0%, var(--too-blue) 100%);
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 100px 20px 50px;
            position: relative;
            overflow: hidden;
        }

        .login-hero::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: url('data:image/svg+xml,<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1440 320"><path fill="%23ffffff" fill-opacity="0.1" d="M0,96L48,112C96,128,192,160,288,160C384,160,480,128,576,112C672,96,768,96,864,112C960,128,1056,160,1152,160C1248,160,1344,128,1392,112L1440,96L1440,320L1392,320C1344,320,1248,320,1152,320C1056,320,960,320,864,320C768,320,672,320,576,320C480,320,384,320,288,320C192,320,96,320,48,320L0,320Z"></path></svg>') bottom center no-repeat;
            background-size: cover;
            animation: floatBackground 20s ease-in-out infinite;
        }

        @keyframes floatBackground {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-20px); }
        }

        .login-container {
            position: relative;
            z-index: 1;
            background: var(--white);
            padding: 3rem;
            border-radius: 20px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
            max-width: 450px;
            width: 100%;
            animation: fadeInUp 0.8s ease;
        }

        @keyframes fadeInUp {
            from {
                opacity: 0;
                transform: translateY(30px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .login-header {
            text-align: center;
            margin-bottom: 2rem;
        }

        .login-logo {
            width: 80px;
            height: 80px;
            margin: 0 auto 1rem;
        }

        .login-title {
            font-size: 2rem;
            font-weight: 700;
            color: var(--dark-gray);
            margin-bottom: 0.5rem;
        }

        .login-subtitle {
            font-size: 1rem;
            color: var(--text-gray);
        }

        .login-form {
            display: flex;
            flex-direction: column;
            gap: 1.5rem;
        }

        .form-group {
            display: flex;
            flex-direction: column;
            gap: 0.5rem;
        }

        .form-label {
            font-weight: 600;
            color: var(--dark-gray);
            font-size: 0.95rem;
        }

        .form-input {
            padding: 12px 16px;
            border: 2px solid #e0e0e0;
            border-radius: 10px;
            font-size: 1rem;
            font-family: 'Poppins', sans-serif;
            transition: all 0.3s ease;
        }

        .form-input:focus {
            outline: none;
            border-color: var(--fire-dragon);
            box-shadow: 0 0 0 3px rgba(248, 113, 2, 0.1);
        }

        .login-button {
            padding: 14px;
            background: var(--fire-dragon);
            color: var(--white);
            border: none;
            border-radius: 10px;
            font-size: 1.1rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            font-family: 'Poppins', sans-serif;
        }

        .login-button:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 20px rgba(248, 113, 2, 0.3);
        }

        .login-button:active {
            transform: translateY(0);
        }

        .error-message {
            background: #fee;
            color: #c00;
            padding: 12px;
            border-radius: 8px;
            text-align: center;
            font-size: 0.9rem;
            display: none;
        }

        .error-message.show {
            display: block;
            animation: shake 0.5s ease;
        }

        @keyframes shake {
            0%, 100% { transform: translateX(0); }
            25% { transform: translateX(-10px); }
            75% { transform: translateX(10px); }
        }

        .back-link {
            text-align: center;
            margin-top: 1.5rem;
        }

        .back-link a {
            color: var(--text-gray);
            text-decoration: none;
            font-size: 0.95rem;
            transition: color 0.3s ease;
        }

        .back-link a:hover {
            color: var(--fire-dragon);
        }

        @media (max-width: 768px) {
            .login-container {
                padding: 2rem 1.5rem;
                margin: 0 1rem;
            }

            .login-title {
                font-size: 1.6rem;
            }
        }
    </style>
</head>
<body>
    <!-- Navigation Bar -->
    <nav class="navbar" id="navbar">
        <div class="container">
            <div class="nav-brand">
                <a href="index.html">
                    <img src="images/logosquare.webp" alt="Lotta Pressure Logo" class="logo-img">
                </a>
            </div>
            <ul class="nav-menu">
                <li><a href="index.html#home" class="nav-link">Home</a></li>
                <li><a href="index.html#services" class="nav-link">Services</a></li>
                <li><a href="index.html#discount" class="nav-link">Military Discount</a></li>
                <li><a href="index.html#reviews" class="nav-link">Reviews</a></li>
                <li><a href="index.html#contact" class="nav-link">Contact</a></li>
            </ul>
            <div class="hamburger">
                <span></span>
                <span></span>
                <span></span>
                <span></span>
                <span></span>
                <span></span>
                <span></span>
                <span></span>
                <span></span>
            </div>
        </div>
    </nav>

    <!-- Login Section -->
    <section class="login-hero">
        <div class="login-container">
            <div class="login-header">
                <img src="images/logosquare.webp" alt="Lotta Pressure Logo" class="login-logo">
                <h1 class="login-title">Employee Login</h1>
                <p class="login-subtitle">Enter your credentials to continue</p>
            </div>

            <form class="login-form" id="loginForm">
                <div class="error-message" id="errorMessage">
                    Invalid password. Please try again.
                </div>

                <div class="form-group">
                    <label for="username" class="form-label">Username</label>
                    <input 
                        type="text" 
                        id="username" 
                        name="username" 
                        class="form-input" 
                        placeholder="Enter your username"
                        required
                    >
                </div>

                <div class="form-group">
                    <label for="password" class="form-label">Password</label>
                    <input 
                        type="password" 
                        id="password" 
                        name="password" 
                        class="form-input" 
                        placeholder="Enter your password"
                        required
                    >
                </div>

                <button type="submit" class="login-button">Login</button>
            </form>

            <div class="back-link">
                <a href="index.html">← Back to Home</a>
            </div>
        </div>
    </section>

    <script>
        // ⚠️ SECURITY WARNING ⚠️
        // This is CLIENT-SIDE authentication only. Anyone who views the page source
        // can see these hashes and potentially reverse-engineer or bypass them.
        // This is NOT secure for sensitive data. Use server-side authentication for production.
        
        // Credentials stored as SHA-256 hashes
        // Valid login: username="lottapressure", password="123"
        const VALID_CREDENTIALS = {
            'lottapressure': 'TEMP_HASH_WILL_BE_GENERATED',
        };

        // Generate the hash for password "123" on page load
        (async function initializeCredentials() {
            const hash = await hashPassword('123');
            VALID_CREDENTIALS['lottapressure'] = hash;
            console.log('✓ Credentials initialized');
            console.log('Username: lottapressure');
            console.log('Password: 123');
            console.log('Hash:', hash);
        })();

        // Utility function to generate password hash (for creating new credentials)
        async function generatePasswordHash(password) {
            const encoder = new TextEncoder();
            const data = encoder.encode(password);
            const hashBuffer = await crypto.subtle.digest('SHA-256', data);
            const hashArray = Array.from(new Uint8Array(hashBuffer));
            const hashHex = hashArray.map(b => b.toString(16).padStart(2, '0')).join('');
            return hashHex;
        }

        // Add some obfuscation with multiple hash rounds
        async function hashPassword(password, salt = 'LottaPressureWashing2026') {
            const combined = salt + password + salt;
            return await generatePasswordHash(combined);
        }

        document.getElementById('loginForm').addEventListener('submit', async function(e) {
            e.preventDefault();
            
            const username = document.getElementById('username').value.toLowerCase().trim();
            const password = document.getElementById('password').value;
            const errorMessage = document.getElementById('errorMessage');

            // Hide error message
            errorMessage.classList.remove('show');

            try {
                // Hash the input password
                const hashedInput = await hashPassword(password);
                
                // Check if username exists and password hash matches
                if (VALID_CREDENTIALS[username] && VALID_CREDENTIALS[username] === hashedInput) {
                    // Set session storage to track login
                    sessionStorage.setItem('employeeLoggedIn', 'true');
                    sessionStorage.setItem('employeeUsername', username);
                    
                    // Redirect to employee dashboard
                    window.location.href = 'employee-dashboard.html';
                } else {
                    // Add delay to prevent brute force
                    await new Promise(resolve => setTimeout(resolve, 1000));
                    errorMessage.classList.add('show');
                }
            } catch (error) {
                console.error('Login error:', error);
                errorMessage.classList.add('show');
            }
        });

        // Developer utility: Uncomment to generate hash for a new password
        // console.log('To create a new password hash:');
        // console.log('1. Open browser console');
        // console.log('2. Run: generatePasswordHash("your-password").then(hash => console.log(hash))');
        // console.log('3. Copy the hash and add to VALID_CREDENTIALS object');
    </script>

    <script src="js/script.js"></script>
</body>
</html>
